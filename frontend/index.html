<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Resume Job Matcher</title>
  </head>
  <body>
    <div class="resume">
      <h3>Put your Resume Here:</h3>
      <textarea class="resume_text" placeholder="Paste your resume here"></textarea>
    </div>

    <div class="jobs" id="job-container">
      <h3>Put your job description here:</h3>
      <div class="job_input">
        <input type="text" class="job_title" placeholder="Job title" />
        <input type="text" class="job_text" placeholder="Job description" />
      </div>
      <input type="button" value="Add Job" class="add" id="add-job-btn" />
    </div>

    <input type="submit" value="Submit" id="submit-btn" />

    <div class="result">
      <h3>Top Matches:</h3>
      <div id="result-container"></div>
    </div>

    <script src="js.js"></script>
  </body>
</html>
